<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailBlast — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4ff; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10); }
  .logo { font-size: 2rem; font-weight: 800; color: #1F4E79; margin-bottom: 6px; }
  .tagline { color: #64748b; font-size: 0.95rem; margin-bottom: 36px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 0.95rem; outline: none; transition: border-color 0.2s; margin-bottom: 18px; }
  input:focus { border-color: #2563eb; }
  button { width: 100%; padding: 13px; background: #2563eb; color: white; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1d4ed8; }
  .error { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 10px 14px;
    font-size: 0.88rem; margin-bottom: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">✉ MailBlast</div>
  <div class="tagline">Bulk Email Sender — Sign in to continue</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Sign In →</button>
  </form>
</div>
</body>
</html>
